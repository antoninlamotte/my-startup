<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MusculationCoach</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BANNER -->
  <div class="banner">
    <div class="container">
      <h1>Musculation</h1>
      <h2 class="banner-subtitle">L'appli de coaching de Musculation pour tous les niveaux</h2>
      <a href="https://www.musculation.fr//" class="btn-yellow" target="_blank">Découvrir l'appli</a>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="container">
    <h2 class="profile-name">Antonin Lamotte</h2>
    <p class="subtitle">Fondateur &amp; coach certifié de Musculation</p>
    <img class="avatar" src="photo.jpeg" alt="Antonin Lamotte">
    <h2 class="section-title">Nos services</h2>
    <div class="cards">
      <div class="card">
        <img src="coursligne.png" alt="Cours en ligne">
        <h3>Cours en ligne</h3>
      </div>
      <div class="card">
        <img src="coaching.jpg" alt="Coaching perso">
        <h3>Coaching perso</h3>
      </div>
      <div class="card">
        <img src="suivi.jpg" alt="Suivi de progression">
        <h3>Suivi de progression</h3>
      </div>
      <div class="card">
        <img src="communaute.jpg" alt="Communauté">
        <h3>Communauté</h3>
      </div>
    </div>
  </div>

</body>
</html>
